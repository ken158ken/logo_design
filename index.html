<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo 設計</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #fafafa; }
      .container { max-width: 960px; margin: 0 auto; padding: 32px 16px; }
      h1 { font-size: 20px; color: #333; margin: 0 0 24px; }
      .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
      .card { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 12px; }
      .card img { width: 100%; height: auto; display: block; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Logo 設計概念</h1>
      <div class="grid">
        <div class="card"><img src="/logo1.jpg" alt="logo 1" /></div>
        <div class="card"><img src="/logo2.jpg" alt="logo 2" /></div>
      </div>
    </div>
  </body>
</html>
